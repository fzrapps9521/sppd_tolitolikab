            };

            toast.className = `flex items-center gap-3 px-5 py-3 ${bgClass} text-white text-xs font-bold rounded-xl shadow-2xl animate-bounce duration-300`;

                <span>${message}</span>
                <button onclick="this.parentElement.remove()" class="ml-2 hover:opacity-80">×</button>

        // Auth Logic
        function handleLogin(event) {
            event.preventDefault();
            const userIn = document.getElementById('login-username').value.trim();
            const passIn = document.getElementById('login-password').value.trim();
            
            const user = db.pegawai.find(p => p.username === userIn || p.nip === userIn);
            if (user && user.password === passIn) {
                session.currentUser = user;
                localStorage.setItem("e_sppd_session", JSON.stringify(user));
                writeLog(user.username, "LOGIN", "Berhasil masuk sistem");
                showToast(`Selamat datang kembali, ${user.nama}!`);
                renderMainLayout();
            } else {
                showToast("Identitas atau kata sandi Anda salah!", "error");
            }
        }

        function handleLogout() {
            if(session.currentUser) {
                writeLog(session.currentUser.username, "LOGOUT", "Keluar dari sistem");
            }
            session.currentUser = null;
            localStorage.removeItem("e_sppd_session");
            document.getElementById('main-layout').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        // Toggle Sidebar Navigation on Mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        // Route Views
        function switchTab(tabId) {
            session.activeTab = tabId;
            document.getElementById('page-title').textContent = MENU_DEFINITIONS.find(m => m.id === tabId)?.label || "Menu";
            
            // Mark Active Side Link
            const links = document.querySelectorAll('.sidebar-link');
            links.forEach(l => {
                if(l.dataset.id === tabId) {
                    l.classList.add('bg-slate-800', 'text-teal-400', 'border-l-4', 'border-teal-500');
                    l.classList.remove('text-slate-400');
                } else {
                    l.classList.remove('bg-slate-800', 'text-teal-400', 'border-l-4', 'border-teal-500');
                    l.classList.add('text-slate-400');
                }
            });

            // Dynamically render page content
            const contentContainer = document.getElementById('content-container');
            if (tabId === 'dashboard') renderDashboard(contentContainer);
            else if (tabId === 'spt-sppd') renderSptSppd(contentContainer);
            else if (tabId === 'approval') renderApproval(contentContainer);
            else if (tabId === 'laporan') renderLaporan(contentContainer);
            else if (tabId === 'master') renderMaster(contentContainer);
            else if (tabId === 'monitoring') renderMonitoring(contentContainer);
            else if (tabId === 'audit-log') renderAuditLog(contentContainer);
            else if (tabId === 'settings') renderSettings(contentContainer);
            else if (tabId === 'integration') renderIntegration(contentContainer);
        }

        // Render Sidebar Navigation Dynamic Links
        function renderMainLayout() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-layout').classList.remove('hidden');

            const user = session.currentUser;
            document.getElementById('user-avatar').textContent = user.nama.charAt(0);
            document.getElementById('user-display-name').textContent = user.nama;
            document.getElementById('user-display-role').textContent = user.role.toUpperCase();

            const navContainer = document.getElementById('nav-links-container');
            navContainer.innerHTML = '';

            MENU_DEFINITIONS.forEach(menu => {
                if(menu.roles.includes(user.role)) {
                    const btn = document.createElement('button');
                    btn.className = 'sidebar-link w-full flex items-center gap-3 px-4 py-3 text-xs font-semibold rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all duration-150 mb-1';
                    btn.dataset.id = menu.id;
                    btn.onclick = () => {
                        switchTab(menu.id);
                        if(window.innerWidth < 768) toggleSidebar();
                    };
                    btn.innerHTML = `
                        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${menu.icon}</svg>
                        <span>${menu.label}</span>
                    `;
                    navContainer.appendChild(btn);
                }
            });

            // Auto Route to first view
            switchTab('dashboard');
        }

        function filterSptTable() {
            const q = document.getElementById('spt-search').value.toLowerCase();
            const rows = document.querySelectorAll('#spt-table-body tr');
            rows.forEach(r => {
                const text = r.textContent.toLowerCase();
                r.style.display = text.includes(q) ? '' : 'none';
            });
        }

        // Open SPT / SPPD Modal
        function openSptModal(id = null) {
            document.getElementById('spt-modal').classList.remove('hidden');
            const pListContainer = document.getElementById('form-pegawai-list');
            pListContainer.innerHTML = '';
            
            // Populate Pegawai checkboxes
            db.pegawai.forEach(p => {
                pListContainer.innerHTML += `
                    <label class="flex items-center gap-2 text-xs font-semibold text-slate-700 cursor-pointer hover:text-slate-900">
                        <input type="checkbox" name="pegawai-select" value="${p.nip}" class="rounded border-slate-300 text-primary-600 focus:ring-primary-500">
                        <span>${p.nama} (${p.nip})</span>
                    </label>
                `;
            });

            // Auto-fill default settings values
            document.getElementById('form-spt-dasar').value = db.settings.dasar_hukum;

            if (id) {
                // Edit Mode
                const s = db.spt.find(x => x.id_spt === id);
                document.getElementById('spt-modal-title').textContent = "Ubah Data SPT / SPPD";
                document.getElementById('form-spt-id').value = s.id_spt;
                document.getElementById('form-spt-no').value = s.no_spt;
                document.getElementById('form-sppd-no').value = s.no_sppd;
                document.getElementById('form-spt-maksud').value = s.maksud_tugas;
                document.getElementById('form-spt-tujuan').value = s.tempat_tujuan;
                document.getElementById('form-spt-alat').value = s.alat_transport;
                document.getElementById('form-spt-tgl-berangkat').value = s.tgl_berangkat;
                document.getElementById('form-spt-tgl-kembali').value = s.tgl_kembali;
                document.getElementById('form-spt-anggaran').value = s.anggaran;
                document.getElementById('form-spt-dasar').value = s.dasar_hukum;

                // Check active pegawai
                const checks = document.querySelectorAll('input[name="pegawai-select"]');
                checks.forEach(c => {
                    if (s.pegawai_terlibat.includes(c.value)) c.checked = true;
                });
            } else {
                // Add Mode
                document.getElementById('spt-modal-title').textContent = "Pembuatan SPT / SPPD Baru";
                document.getElementById('form-spt-id').value = '';
                document.getElementById('spt-form').reset();
                document.getElementById('form-spt-dasar').value = db.settings.dasar_hukum;
            }
        }

        function closeSptModal() {
            document.getElementById('spt-modal').classList.add('hidden');
        }

        function saveSptData(event) {
            event.preventDefault();
            
            // Collect Selected Pegawai
            const checks = document.querySelectorAll('input[name="pegawai-select"]:checked');
            const pSelected = Array.from(checks).map(c => c.value);
            
            if (pSelected.length === 0) {
                showToast("Anda harus memilih minimal satu pegawai pelaksana!", "error");
                return;
            }

            const id = document.getElementById('form-spt-id').value;
            const noSpt = document.getElementById('form-spt-no').value;
            const noSppd = document.getElementById('form-sppd-no').value;
            const maksud = document.getElementById('form-spt-maksud').value;
            const tujuan = document.getElementById('form-spt-tujuan').value;
            const alat = document.getElementById('form-spt-alat').value;
            const tglB = document.getElementById('form-spt-tgl-berangkat').value;
            const tglK = document.getElementById('form-spt-tgl-kembali').value;
            const anggaran = document.getElementById('form-spt-anggaran').value;
            const dasar = document.getElementById('form-spt-dasar').value;

            if (id) {
                // Update
                const idx = db.spt.findIndex(x => x.id_spt === id);
                db.spt[idx] = {
                    ...db.spt[idx],
                    no_spt: noSpt,
                    no_sppd: noSppd,
                    pegawai_terlibat: pSelected,
                    maksud_tugas: maksud,
                    tempat_tujuan: tujuan,
                    alat_transport: alat,
                    tgl_berangkat: tglB,
                    tgl_kembali: tglK,
                    anggaran: anggaran,
                    dasar_hukum: dasar
                };
                writeLog(session.currentUser.username, "UPDATE", `Mengubah data SPT No. ${noSpt}`);
                showToast("Data SPT berhasil diubah!");
            } else {
                // Add New
                const newSpt = {
                    id_spt: "SPT-" + Date.now(),
                    no_spt: noSpt,
                    no_sppd: noSppd,
                    pegawai_terlibat: pSelected,
                    maksud_tugas: maksud,
                    tempat_tujuan: tujuan,
                    alat_transport: alat,
                    tgl_berangkat: tglB,
                    tgl_kembali: tglK,
                    anggaran: anggaran,
                    dasar_hukum: dasar,
                    status: "Pending", // Default awaiting approval
                    catatan_pimpinan: "",
                    pembuat: session.currentUser.username
                };
                db.spt.push(newSpt);
                writeLog(session.currentUser.username, "CREATE", `Membuat SPT No. ${noSpt}`);
                showToast("SPT Baru berhasil diajukan untuk disetujui!");
            }

            saveDBToStorage("e_sppd_spt", db.spt);
            closeSptModal();
            renderSptTable();
        }

        function deleteSptData(id) {
            if (confirm("Apakah Anda yakin ingin menghapus data SPT & SPPD ini? Tindakan ini tidak dapat dibatalkan.")) {
                const s = db.spt.find(x => x.id_spt === id);
                db.spt = db.spt.filter(x => x.id_spt !== id);
                writeLog(session.currentUser.username, "DELETE", `Menghapus SPT No. ${s.no_spt}`);
                saveDBToStorage("e_sppd_spt", db.spt);
                showToast("Data SPT berhasil dihapus!");
                renderSptTable();
            }
        }

        function processApproval(id, status) {
            const note = document.getElementById(`note-${id}`).value;
            const idx = db.spt.findIndex(x => x.id_spt === id);
            
            db.spt[idx].status = status;
            db.spt[idx].catatan_pimpinan = note || (status === 'Approved' ? 'Disetujui.' : 'Ditolak untuk revisi.');
            
            writeLog(session.currentUser.username, status === 'Approved' ? 'APPROVE' : 'REJECT', `Menentukan status ${status} pada SPT No. ${db.spt[idx].no_spt}`);
            saveDBToStorage("e_sppd_spt", db.spt);
            showToast(`Status pengajuan berhasil diubah menjadi: ${status}!`);
            switchTab('approval');
        }

        function savePegawai(event) {
            event.preventDefault();
            const nip = document.getElementById('p-form-nip').value;
            const nama = document.getElementById('p-form-nama').value;
            const j = document.getElementById('p-form-jabatan').value;
            const g = document.getElementById('p-form-golongan').value;
            const u = document.getElementById('p-form-unit').value;
            const hp = document.getElementById('p-form-hp').value;
            const user = document.getElementById('p-form-user').value;
            const pass = document.getElementById('p-form-pass').value;
            const role = document.getElementById('p-form-role').value;

            const existingIdx = db.pegawai.findIndex(x => x.nip === nip);
            if (existingIdx > -1) {
                db.pegawai[existingIdx] = { nip, nama, id_jabatan: j, id_golongan: g, id_unit: u, no_hp: hp, username: user, password: pass, role };
            } else {
                db.pegawai.push({ nip, nama, id_jabatan: j, id_golongan: g, id_unit: u, no_hp: hp, username: user, password: pass, role });
            }

            saveDBToStorage("e_sppd_pegawai", db.pegawai);
            writeLog(session.currentUser.username, "UPDATE", `Menyimpan data master pegawai: ${nama}`);
            showToast("Data pegawai berhasil disimpan!");
            closePegawaiModal();
            switchMasterSubTab('pegawai');
        }

        // --- HELPERS ---

        function calculateDays(startDate, endDate) {
            const start = new Date(startDate);
            const end = new Date(endDate);
            const diffTime = Math.abs(end - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; 
            return isNaN(diffDays) ? 0 : diffDays;
        }

        function formatDateIndo(dateStr) {
            if(!dateStr) return "-";
            const months = [
                "Januari", "Februari", "Maret", "April", "Mei", "Juni",
                "Juli", "Agustus", "September", "Oktober", "November", "Desember"
            ];
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            const day = parseInt(parts[2]);
            const month = months[parseInt(parts[1]) - 1];
            const year = parts[0];
            return `${day} ${month} ${year}`;
        }


        // RUN INITIALIZER
        window.onload = function() {
            initializeDB();
            
            // Check session
            const savedSession = localStorage.getItem("e_sppd_session");
            if(savedSession) {
                session.currentUser = JSON.parse(savedSession);
                renderMainLayout();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }

            // Real-Time Ticker
            setInterval(() => {
                const now = new Date();
                const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
                const dayName = days[now.getDay()];
                document.getElementById('live-time-ticker').textContent = `${dayName}, ${now.getDate()} ${formatDateIndo((now.toISOString().split('T')[0])).split(' ')[1]} ${now.getFullYear()} | ${now.toLocaleTimeString('id-ID')} WITA`;
            }, 1000);
        }
